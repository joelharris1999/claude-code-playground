name: Weather Log

on:
  schedule:
    # 06:30 UTC daily (~7:30am in London through most of the year)
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-weather-log:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute date
        id: vars
        run: echo "date=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Fetch weather and update log
        run: node scripts/fetch-weather.mjs

      - name: Open pull request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update weather log for ${{ steps.vars.outputs.date }}"
          title: "Weather log: London forecast for ${{ steps.vars.outputs.date }}"
          body: |
            Automated update from the [Weather Log workflow](../actions/workflows/weather-log.yml).

            Fetches the current London forecast from [Open-Meteo](https://open-meteo.com/) and appends it to `weather-log.md`.

            Auto-merge is enabled on this PR so it lands without manual action — this keeps daily
            runs from piling up unmerged and colliding with each other in `weather-log.md`.
          branch: weather-log/${{ steps.vars.outputs.date }}
          delete-branch: true
          add-paths: weather-log.md

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash --delete-branch "${{ steps.cpr.outputs.pull-request-number }}"
